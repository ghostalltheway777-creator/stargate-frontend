workflows:
  android-release:
    name: Stargate Android Release
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          # Patch capacitor.build.gradle to remove cordova dependency
          sed -i 's|apply from: "../capacitor-cordova-android-plugins/cordova.variables.gradle"||g' app/capacitor.build.gradle
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
