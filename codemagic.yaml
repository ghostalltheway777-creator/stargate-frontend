workflows:
  android-release:
    name: Stargate Android Release
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
